name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Build standalone binary
        run: npm run build

      - name: Upload binary to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: shop502-cart-tui-linux-x64
          path: dist/shop502-cart
          retention-days: 30
